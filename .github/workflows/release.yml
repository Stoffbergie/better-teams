name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Existing release tag to publish
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build Release
    runs-on: macos-14
    env:
      TAG_NAME: ${{ github.event.inputs.tag || github.ref_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ env.TAG_NAME }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify
        run: bun run verify

      - name: Build release assets
        run: bun run make

      - name: Publish draft release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          assets=()
          while IFS= read -r asset; do
            assets+=("$asset")
          done < <(find out/make -type f \( -name "*.dmg" -o -name "*.zip" \) | sort)
          if [ "${#assets[@]}" -eq 0 ]; then
            echo "No release assets found under out/make"
            exit 1
          fi
          gh release create "$TAG_NAME" "${assets[@]}" --draft --title "Better Teams $TAG_NAME" --notes "Desktop build produced by GitHub Actions."
